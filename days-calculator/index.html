<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>日数計算 - Yapps</title>
        <link rel="icon" type="image/png" href="/img/logo.png">

        <link rel="stylesheet" href="/style.css">
        <link rel="stylesheet" href="/app-page.css">
        <link rel="stylesheet" href="/simple-textarea.css">
        <link rel="stylesheet" href="/simple-select.css">
        <link rel="stylesheet" href="/buttons.css">
        <link rel="stylesheet" href="/checkbox.css">
        <link rel="stylesheet" href="/badges.css">
        <link rel="stylesheet" href="/information.css">
        <link rel="stylesheet" href="/box.css">

        <script src="/js/jquery-3.5.1.min.js"></script>
        <script src="/js/common.min.js"></script>
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-43EGG0HL47"></script>
        <script src="./js/days-calculator.js"></script>

        <script type="application/ld+json">
            {
              "@context": "https://schema.org",
              "@type": "WebSite",
              "name": "Yapps",
              "url": "https://yapps.yotiosoft.com/"
            }
        </script>

        <script>
            wakeup();
        </script>
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5605897321593790"
     crossorigin="anonymous"></script>
        <script src="/js/adsense.min.js"></script>

        <style>
            .calculator-section,
            .result-box,
            .history-item {
                margin-bottom: 24px;
                padding: 18px;
                background-color: #fff;
                border: 1px solid #ddd;
                border-radius: 6px;
            }

            .input-table {
                width: 100%;
            }

            .input-table .summary {
                width: 210px;
                vertical-align: top;
                text-align: left;
            }

            .input-table .input {
                padding: 6px 0;
            }

            .field-line,
            .option-group,
            .history-header {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                align-items: center;
            }

            .field-line .simple-inputtext {
                margin-bottom: 0;
            }

            .date-input {
                width: 220px;
            }

            .time-input {
                width: 170px;
            }

            button.round-rect-button {
                background-color: #fff;
                color: inherit;
                cursor: pointer;
                font-family: inherit;
            }

            .small-button {
                font-size: 16px;
                padding: 6px 10px;
                margin: 0;
            }

            .small-button .middle-text {
                line-height: 1.2;
            }

            .option-item {
                display: inline-flex;
                gap: 6px;
                align-items: center;
            }

            .helper-text,
            .history-meta,
            .result-note {
                font-size: 14px;
            }

            .result-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(220px, 1fr));
                gap: 14px;
                margin: 16px 0;
            }

            .result-card {
                padding: 16px;
                background-color: #fff;
                border: 1px solid #ddd;
                border-radius: 6px;
            }

            .result-label {
                margin-bottom: 6px;
                font-size: 14px;
                color: #666;
            }

            .result-value {
                font-size: 30px;
                font-weight: bold;
                color: #2f6fb3;
                line-height: 1.2;
            }

            .result-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
            }

            .result-table th,
            .result-table td {
                padding: 10px 8px;
                border-bottom: 1px solid #ddd;
                text-align: left;
                vertical-align: top;
            }

            .hidden {
                display: none;
            }

            @media screen and (max-width: 768px) {
                .input-table .summary,
                .input-table .input {
                    display: block;
                    width: 100%;
                }

                .date-input,
                .time-input {
                    width: 100%;
                }

                .result-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>

    <body>
        <header>
            <div id="wrap" style="width: 100%;">
                <div id="header"></div>
            </div>
        </header>

        <div id="wrap">
            <div id="contents-wrap">
                <div class="title">
                    <img src="/img/tools_icon/math/days-calculator.svg" type="image/svg+xml" width="48" height="48" alt="日数計算">
                    日数計算
                    <div class="badge-group">
                        <div class="badge-ver">ver.1.0</div>
                        <div class="badge-clientside">Client Side</div>
                        <div class="badge-offline">Offline OK</div>
                    </div>
                </div>
                <p class="summary">
                    開始日から終了日までの日数を計算します。<br>
                    初日を含める設定に加え、時刻を含めた経過時間の確認にも対応しています。
                </p>
                <div id="update_information"></div>
                <div id="intl_caution"></div>

                <div class="app-area" id="app-area-id" style="overflow: auto;">
                    <div class="calculator-section">
                        <table class="input-table">
                            <tr>
                                <td class="summary">
                                    <div class="checkbox">開始</div>
                                </td>
                                <td class="input">
                                    <div class="field-line">
                                        <input type="date" id="start-date" class="simple-inputtext date-input">
                                        <input type="time" id="start-time" class="simple-inputtext time-input time-field" step="60">
                                        <button type="button" class="round-rect-button small-button" onclick="setCurrentValue('start')">
                                            <div class="middle-text">現在をセット</div>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="summary">
                                    <div class="checkbox">終了</div>
                                </td>
                                <td class="input">
                                    <div class="field-line">
                                        <input type="date" id="end-date" class="simple-inputtext date-input">
                                        <input type="time" id="end-time" class="simple-inputtext time-input time-field" step="60">
                                        <button type="button" class="round-rect-button small-button" onclick="setCurrentValue('end')">
                                            <div class="middle-text">現在をセット</div>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="summary">
                                    <div class="checkbox">オプション</div>
                                </td>
                                <td class="input">
                                    <div class="option-group">
                                        <label class="option-item" for="use-time">
                                            <input type="checkbox" id="use-time" onchange="toggleTimeInputs()">
                                            <span>時刻も計算する</span>
                                        </label>
                                        <label class="option-item" for="include-start">
                                            <input type="checkbox" id="include-start">
                                            <span>初日を含む</span>
                                        </label>
                                    </div>
                                    <p class="helper-text">時刻を含めると、カレンダー日数に加えて経過時間・総時間・総分も表示します。</p>
                                </td>
                            </tr>
                        </table>

                        <div class="button-area-center">
                            <button type="button" class="round-rect-button" onclick="calculateDays()">
                                <div class="big-text">日数を計算</div>
                            </button>
                            <button type="button" class="round-rect-button" onclick="swapDates()">
                                <div class="big-text">開始と終了を入れ替え</div>
                            </button>
                        </div>
                    </div>

                    <div id="result-display" class="result-box" style="display: none;">
                        <h3 style="margin-top: 0;">計算結果</h3>
                        <div id="result-content"></div>
                    </div>

                    <div class="calculator-section" style="margin-top: 24px;">
                        <h3 style="margin-top: 0;">計算履歴</h3>
                        <div id="history-list">
                            <p style="text-align: center; padding: 20px;">まだ計算履歴がありません</p>
                        </div>
                        <div class="button-area-center" style="margin-bottom: 0;">
                            <button type="button" class="round-rect-button" onclick="clearHistory()">
                                <div class="big-text">履歴をクリア</div>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="ads-wide"></div>
                <script>
                ads_wide("ads-wide");
                </script>

                <div class="related-apps">
                    <div class="title">関連アプリ</div>
                    <div class="app-list">
                        <div class="box-horizon-area" id="related-apps"></div>
                    </div>
                    <script>apps2box("related-apps", "days-calculator", "box-horizontal");</script>
                </div>
            </div>
        </div>

        <footer class="footer_class">
            <div id="footer"></div>
        </footer>
    </body>
</html>
